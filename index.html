<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Backlog</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #121212;
            color: #eee;
        }

        h2 {
            border-bottom: 2px solid #333;
            padding-bottom: 5px;
            margin-top: 40px;
        }

        /* flex > grid  */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .item {
            background-color: #1a1a1a;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            transition: transform 0.1s;
        }

        .item:hover {
            transform: scale(1.05); /* just a lil pop */
            cursor: pointer;
        }

        .item img {
            width: 100%;
            height: 220px;
            object-fit: cover; /* saves the weird aspect ratios */
            border-radius: 4px;
        }

        .item p {
            margin: 10px 0 0 0;
            font-size: 0.9em;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>The Eternal Backlog</h1>

    <h2>Currently Going Through</h2>
    <div id="in-progress-grid" class="grid"></div>

    <h2>Never Ending Black Hole</h2>
    <div id="backlog-grid" class="grid"></div>

    <h2>Actually Finished</h2>
    <div id="completed-grid" class="grid"></div>

    <script src="script.js"></script>
</body>
</html>
