name: Update Backlog README

on:
  schedule:
    - cron: "0 0 * * *" # Runs every midnight
  issues:
    types: [opened, edited, deleted, labeled, unlabeled, closed] # Runs live when updating an issue
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Run Update Script
        run: node update-readme.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          # Only commit if there are actual changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: update backlog grids in README" && git push)